<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app-wrapper">
        
        <!-- Sidebar Bên Trái -->
        <aside id="left-sidebar">
            <div id="graph-info-panel">
                <h3>Đường Đi Hợp Lệ</h3>
                
                <div style="text-align: center; margin-bottom: 10px;">
                    <button id="btn-toggle-graph-view">Hiển thị Ma trận</button>
                </div>
                
                <div id="adjacency-list-view">
                    <ul id="adjacency-list-ul">
                        <!-- Dynamic routing list -->
                    </ul>
                </div>
                
                <div id="adjacency-matrix-view" style="display: none; overflow-x: auto;">
                    <table id="adjacency-matrix-table" class="matrix-table">
                        <!-- Dynamic matrix -->
                    </table>
                </div>
                
                <div id="current-path-display" style="margin-top: 15px; border-top: 1px solid #334155; padding-top: 10px;">
                    <h4 style="color: #38bdf8; font-size: 1rem; margin-bottom: 5px;">Đường đi:</h4>
                    <div id="path-string" style="color: #f59e0b; word-wrap: break-word; font-weight: bold;">Chưa có</div>
                </div>
            </div>
        </aside>

        <div id="game-container">
            <header>
                <h1>The Cosmic Weaver</h1>
                <div id="status-panel">
                    <span>Seed: <strong id="seed-display">---</strong></span>
                    <span id="timer-display" style="margin-left:15px; color:#f59e0b;">00:00</span>
                </div>
                <div id="actions">
                    <button id="btn-undo">Undo</button>
                    <button id="btn-restart">Thử lại (Reset Line)</button>
                    
                    <div style="display: inline-flex; align-items: center; gap: 5px; background: #1e293b; padding: 5px 10px; border-radius: 4px; border: 1px solid #334155;">
                        <input type="checkbox" id="chk-hard-mode" style="cursor: pointer;">
                        <label for="chk-hard-mode" style="color: #ef4444; font-weight: bold; font-size: 0.9em; cursor: pointer;">Đường 1 Chiều</label>
                    </div>
                    
                    <button id="btn-new-game" style="background-color: #ef4444;">Đổi màn mới</button>
                    <!-- Tạm ẩn nút show đáp án chờ Giai đoạn vẽ -->
                    <button id="btn-hint" style="background-color: #8b5cf6; display: none;">Xem Đáp án</button>
                    
                    <div id="debug-toggle-wrap" style="display: inline-flex; align-items: center; gap: 5px; background: #1e293b; padding: 5px 10px; border-radius: 4px; border: 1px solid #475569;">
                        <input type="checkbox" id="chk-debug-path" style="cursor: pointer;">
                        <label for="chk-debug-path" style="color: #94a3b8; font-size: 0.85em; cursor: pointer;">Debug</label>
                    </div>
                </div>
            </header>


        <!-- Overlay Phân tích Đồ thị -->
        <div id="analysis-overlay">
            <h2>Giai đoạn Kiểm tra</h2>
            <p>Liệu chòm sao này có thể được thắp sáng bằng một nét vẽ liên tục và có thể quay về điểm xuất phát không? (Hãy đếm số đỉnh bậc lẻ)</p>
            <div class="analysis-btn-group">
                <button id="btn-guess-circuit" class="btn-guess">Đó là Chu trình Euler (0 đỉnh lẻ)</button>
                <button id="btn-guess-path" class="btn-guess">Chỉ là Đường đi Euler (2 đỉnh lẻ)</button>
                <button id="btn-guess-none" class="btn-guess">Không phải cả hai (Nhiều đỉnh lẻ)</button>
            </div>
            <p id="analysis-feedback" style="color: #ef4444; margin-top: 10px; font-weight: bold;"></p>
        </div>

        <main style="position: relative;">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </main>
        </div> <!-- End game-container -->

        <!-- Sidebar Bên Phải -->
        <aside id="multiplayer-sidebar">
            <div id="multiplayer-panel">
                <h3>Multiplayer</h3>
                <input type="text" id="nickname-input" placeholder="Tên của bạn..." maxlength="15">
                
                <div class="mp-actions-row">
                    <button id="btn-create-room" style="background-color: #3b82f6;">Tạo Phòng</button>
                </div>
                
                <div class="mp-actions-row">
                    <input type="text" id="room-input" placeholder="Mã 4 số..." maxlength="4" style="width: 83%;">
                    <button id="btn-join">Vào</button>
                </div>
                
                <div id="room-status-wrap">
                    Trạng thái: <span id="room-status" style="color: #94a3b8;">Chưa vào phòng</span>
                </div>
                
                <button id="btn-start-mp" style="display:none; background-color: #10b981;">Bắt đầu Game</button>
                <button id="btn-disconnect-mp" style="display:none; background-color: #64748b; margin-top: 5px;">Thoát Phòng</button>
            </div>

            <div id="player-list-container">
                <h3>Thành viên phòng</h3>
                <ul id="player-list">
                    <!-- Dynamic rendering -->
                </ul>
            </div>
        </aside>
    </div> <!-- End app-wrapper -->

    <!-- Socket.io client -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- ES6 Module load -->
    <script type="module" src="/js/main.js"></script>
</body>
</html>
